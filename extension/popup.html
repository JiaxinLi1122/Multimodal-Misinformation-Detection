<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-False Detector</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px;
      color: #2c2c2c;
    }

    button {
      width: 100%;
      padding: 8px 0;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }

    #result {
      margin-top: 14px;
      padding: 10px;
      border-radius: 6px;
      background: #f3f4f6;
      min-height: 48px;
      font-size: 13px;
      color: #374151;
      white-space: pre-wrap;
      /* background is swapped by popup.js to reflect risk level:
         HIGH → red-100  MEDIUM → yellow-100  LOW → green-100 */
      transition: background 0.2s ease;
    }
  </style>
</head>
<body>
  <h1>Multi-False Detector</h1>

  <button id="analyseBtn">Analyse Current Page</button>

  <!-- Result area – updated by popup.js -->
  <div id="result">Press the button to analyse this page.</div>

  <script src="popup.js"></script>
</body>
</html>
