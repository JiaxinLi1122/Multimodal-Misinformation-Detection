<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-False Detector</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px;
      color: #2c2c2c;
    }

    button {
      width: 100%;
      padding: 8px 0;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }

    #result {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: #f3f4f6;
      font-size: 13px;
      color: #374151;
      transition: background 0.2s ease;
    }

    /* Risk badge – big centred label */
    #risk-badge {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.05em;
      padding: 6px 0 2px;
    }

    #risk-badge.HIGH    { color: #b91c1c; }
    #risk-badge.MEDIUM  { color: #92400e; }
    #risk-badge.LOW     { color: #166534; }

    /* Confidence line */
    #confidence-line {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid rgba(0,0,0,0.1);
      margin: 8px 0;
    }

    /* Explanation bullet list */
    #explanations-list {
      margin: 6px 0 8px;
      padding-left: 18px;
      line-height: 1.55;
    }

    #explanations-list li {
      margin-bottom: 4px;
    }

    /* Meta line at the bottom */
    #meta-line {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 6px;
    }

    /* Error / loading states */
    #status-text {
      color: #374151;
    }

    /* Background colours per risk level */
    #result.HIGH    { background: #fee2e2; }
    #result.MEDIUM  { background: #fef9c3; }
    #result.LOW     { background: #dcfce7; }
  </style>
</head>
<body>
  <h1>Multi-False Detector</h1>

  <button id="analyseBtn">Analyse Current Page</button>

  <div id="result">
    <!-- Default state -->
    <span id="status-text">Press the button to analyse this page.</span>

    <!-- Populated after a successful API response -->
    <div id="analysis-output" style="display:none">
      <div id="risk-badge"></div>
      <div id="confidence-line"></div>
      <hr class="divider" />
      <ul id="explanations-list"></ul>
      <div id="meta-line"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
